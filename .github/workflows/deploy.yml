name: Deploy

on:
  release:
    types: [ published ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -X POST http://${{ secrets.SERVER_IP }}:9000/hooks/deploy-chorehub \
          -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
          --fail