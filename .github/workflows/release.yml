name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write

jobs:
  release:
    name: Semantic Release & Docker Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Project Dependencies
        run: npm ci

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx \
          -p semantic-release \
          -p @semantic-release/git \
          -p @semantic-release/changelog \
          semantic-release

      - name: Check for new release tag
        id: check_tag
        run: |
          NEW_TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || echo "")

          CLEAN_VERSION=${NEW_TAG#v}

          echo "tag=$CLEAN_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: steps.check_tag.outputs.tag != ''
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check_tag.outputs.tag != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check_tag.outputs.tag != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            hildedev/chorehub:latest
            hildedev/chorehub:${{ steps.check_tag.outputs.tag }}