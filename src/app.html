<!doctype html>
<!--suppress HtmlUnknownTarget %sveltekit.assets% is not detected by IDE. -->
<html data-theme="default">
<!--suppress HtmlRequiredTitleElement Title is set in the Svelte files. -->
<head>
  <meta charset="utf-8" />
  <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest">
  <link rel="icon" href="%sveltekit.assets%/icon.ico" sizes="32x32">
  <link rel="icon" href="%sveltekit.assets%/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <link id="theme-css" rel="stylesheet" href="%sveltekit.assets%/themes/default.css" />

  <script>
    (function() {
      try {
        let savedScheme = localStorage.getItem('color-scheme');
        if (!savedScheme) {
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          savedScheme = prefersDark ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-color-scheme', savedScheme);
      } catch (e) {
        // Fallback if localStorage is disabled/unavailable
        document.documentElement.setAttribute('data-color-scheme', 'light');
      }
    })();
  </script>

  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
<div style="display: contents">%sveltekit.body%</div>
</body>
</html>
