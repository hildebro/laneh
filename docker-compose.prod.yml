services:
  db:
    image: postgres
    restart: always
    # No ports exposed directly in production!
    environment:
      POSTGRES_USER: ${POSTGRES_USER} # Use environment variables
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persistent storage
    networks:
      - app-network

  app:
    build: .  # Build the full, multi-stage image
    restart: always
    ports:
      - "127.0.0.1:3000:3000"  # Expose on localhost only
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      # Add any other production-specific environment variables here
    depends_on:
      - db
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge