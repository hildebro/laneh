services:
  chorehub-db:
    image: docker.io/postgres:17.4-bookworm
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${DATABASE_LOCATION}:/var/lib/postgresql/data
    networks:
      - chorehub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  chorehub-app:
    image: docker.io/hildedev/chorehub:latest
    restart: always
    ports:
      - "127.0.0.1:${APP_PORT}:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    depends_on:
      chorehub-db:
        condition: service_healthy
    networks:
      - chorehub-network

networks:
  chorehub-network:
    driver: bridge