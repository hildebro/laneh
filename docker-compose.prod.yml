services:
  laneh-db:
    image: docker.io/postgres:17.4-bookworm
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${DATABASE_LOCATION}:/var/lib/postgresql/data
    configs:
      - source: init-db-user
        target: /docker-entrypoint-initdb.d/init-db-user.sql
    networks:
      - laneh-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  laneh-app:
    image: docker.io/hildedev/laneh:latest
    restart: always
    ports:
      - 127.0.0.1:${APP_PORT}:3000
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    depends_on:
      laneh-db:
        condition: service_healthy
    networks:
      - laneh-network

configs:
  init-db-user:
    content: |
      CREATE USER ${APP_DB_USER} WITH PASSWORD '${APP_DB_PASSWORD}';
      GRANT CONNECT ON DATABASE ${POSTGRES_DB} TO ${APP_DB_USER};
      GRANT USAGE ON SCHEMA public TO ${APP_DB_USER};
      GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO ${APP_DB_USER};
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO ${APP_DB_USER};

networks:
  laneh-network:
    driver: bridge