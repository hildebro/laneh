services:
  chorehub-db:
    image: postgres:17.4-bookworm
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - chorehub_data:/var/lib/postgresql/data
    networks:
      - chorehub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  chorehub-migrator:
    image: hildedev/chorehub:latest
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    command: npm run db:migrate
    networks:
      - chorehub-network
    depends_on:
      chorehub-db:
        condition: service_healthy

  chorehub-app:
    image: hildedev/chorehub:latest
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    depends_on:
      chorehub-migrator:
        condition: service_completed_successfully
    networks:
      - chorehub-network

volumes:
  chorehub_data:

networks:
  chorehub-network:
    driver: bridge