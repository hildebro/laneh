services:
  db:
    image: postgres:17.4-bookworm
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: # Persistent database data.  VERY IMPORTANT!
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  app:
    build:
      context: .
      target: builder
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: development
    volumes:
      - ./:/app
      - /app/node_modules  # Named volume for faster node_modules
    depends_on:
      - db
    networks:
      - app-network
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge