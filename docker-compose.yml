services:
  chorehub-db:
    image: postgres:17.4-bookworm
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: # Persistent database data.  VERY IMPORTANT!
      - chorehub_data:/var/lib/postgresql/data
    networks:
      - chorehub-network

  chorehub-app:
    build:
      context: .
      target: builder
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: development
    volumes:
      - ./:/app
    depends_on:
      - chorehub-db
    networks:
      - chorehub-network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  chorehub_data:

networks:
  chorehub-network:
    driver: bridge