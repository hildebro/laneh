services:
  laneh-db:
    image: postgres:17.4-bookworm
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: # Persistent database data.  VERY IMPORTANT!
      - ${DATABASE_LOCATION}:/var/lib/postgresql/data
    networks:
      - laneh-network

  laneh-app:
    build:
      context: .
      target: builder
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "${APP_PORT}:5173"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: development
    volumes:
      - ./:/app
    depends_on:
      - laneh-db
    networks:
      - laneh-network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

networks:
  laneh-network:
    driver: bridge